<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>候卿尸祖 - 实习打卦</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- 引入字体图标 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="chat-box">
            <div class="chat-header">
                <img src="/static/images/img.webp" alt="候卿尸祖" class="avatar">
                <div class="header-info">
                    <h2>候卿尸祖</h2>
                    <p>跌落山崖，大难不死。习得神算，造福世人！</p>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- 欢迎消息 -->
                <div class="message bot-message">
                    我乃画江湖之有品哥候卿，和姐姐不合离家出走。年轻时也曾经走南闯北，遍历中华山河大地。除泣血录外，
                    又精通阴阳五行，能算命、紫薇斗数、姓名测算、占卜凶吉，看命运八字。请问阁下有何指教？
                    当然，现今日新月异，如果问我一些奇怪的问题，哥哥我也需借助外力，召唤不良人里李莽帮忙。
                </div>
            </div>

            <div class="chat-input">
                <textarea id="userInput" placeholder="兄台有何疑问..."></textarea>
                <button id="sendButton">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
